<!DOCTYPE html>
<html lang = "vi">
	<head>
		<title>Bảng cửu chương</title>
		<meta charset = "utf-8">
		<link rel = "stylesheet" href = "../css/style5.css">
	</head>
    <body>
        <h2>In bảng cửu chương</h2>
        <form id = "frmInBangCC" onsubmit="return inBang()">
            <label for = "so">Nhập Số</label>
            <input type = "number" id = "so" required>
            <button type = "submit" onclick="functionIBCC">In</button>
        </form>
        <div id = "ketqua"></div>
        <script>
                function inBang() {
                const myfrm = document.forms["frmInBangCC"];
                const mytextfield = myfrm.elements[0];
                let so = parseInt(mytextfield.value);
                let ketqua = "";
                for (let i=1; i<=10; i++)
                {
                    ketqua += so + " x " + i + " = " + (so * i) + "<br>";
                }
                document.getElementById("ketqua").innerHTML = ketqua;
                return false;
                }
        </script>
    </body>
</html>
