<!DOCTYPE html>
<html lang = "vi">
	<head>
		<title>Hóa đơn thanh toán</title>
		<meta charset = "utf-8">
		<link rel = "stylesheet" href = "../css/style4.css">
	</head>
    <body>
        <h2>Hóa đơn thanh toán</h2>
        <div class="container">
        <table border="1">
            <tr>
                <th>STT</th>
                <th>Tên sản phẩm</th>
                <th>Số lượng</th>
                <th>Đơn giá</th>
                <th>Thành tiền</th>
            </tr>
            <tr>
                <td>1</td>
                <td>A</td>
                <td class="sl">3</td>
                <td class="dg">1000</td>
                <td class="tt"></td>
            </tr>
            <tr>
                <td>2</td>
                <td>B</td>
                <td class="sl">2</td>
                <td class="dg">2000</td>
                <td class="tt"></td>
            </tr>
            <tr>
                <td>3</td>
                <td>C</td>
                <td class="sl">4</td>
                <td class="dg">3000</td>
                <td class="tt"></td>
            </tr>
            <tr>
                <td colspan="3">Tổng thanh toán</td>
                <td colspan="2" id="tongthanhToan"></td>
            </tr>
        </table>
        </div>
        <script>
            const donGia=document.getElementsByClassName("dg");
            const soLuong=document.getElementsByClassName("sl");
            const thanhTien=document.getElementsByClassName("tt");
            let tongthanhToan=0;
            for(let i=0; i < donGia.length; i++)
            {
                thanhTien[i].innerHTML = soLuong[i].innerHTML * donGia[i].innerHTML;
                tongthanhToan += parseInt(thanhTien[i].innerHTML);
            }
            document.getElementById("tongthanhToan").innerHTML = tongthanhToan;
        </script>
    </body>
</html>
